version: "3.9"

x-worker-common: &worker-common
  build: .
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - .:/app
  networks:
    - smr_internal
  restart: unless-stopped

services:

  traefik:
    image: traefik:v3.6
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=smr_egress"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"
      - "--certificatesresolvers.letsencrypt.acme.email=matheus.marinello@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.propagation.delayBeforeChecks=10"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--entrypoints.websecure.http.tls.domains[0].main=kagetrade.com"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.kagetrade.com"
      - "--log.level=INFO"
      - "--accesslog=true"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - smr_egress
    restart: unless-stopped

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: smr
      POSTGRES_USER: smr
      POSTGRES_PASSWORD: smrpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    networks:
      - smr_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smr -d smr"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    networks:
      - smr_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    <<: *worker-common
    command: gunicorn smr.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile - --error-logfile -
    networks:
      - smr_internal
      - smr_egress
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smr-web.rule=Host(`kagetrade.com`)"
      - "traefik.http.routers.smr-web.entrypoints=websecure"
      - "traefik.http.routers.smr-web.tls=true"
      - "traefik.http.routers.smr-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.smr-web.loadbalancer.server.port=8000"
      - "traefik.http.services.smr-web.loadbalancer.healthcheck.path=/health/"
      - "traefik.http.services.smr-web.loadbalancer.healthcheck.interval=15s"
    restart: unless-stopped

  worker_discovery:
    <<: *worker-common
    command: celery -A smr worker -Q discovery -c 2 -n discovery@%h --loglevel=info

  worker_tracking:
    <<: *worker-common
    command: celery -A smr worker -Q tracking -c 4 -n tracking@%h --loglevel=info

  worker_scoring:
    <<: *worker-common
    command: celery -A smr worker -Q scoring -c 2 -n scoring@%h --loglevel=info

  worker_alerts:
    <<: *worker-common
    command: celery -A smr worker -Q alerts -c 2 -n alerts@%h --loglevel=info

  worker_billing:
    <<: *worker-common
    command: celery -A smr worker -Q billing -c 2 -n billing@%h --loglevel=info

  beat:
    <<: *worker-common
    command: celery -A smr beat --scheduler django_celery_beat.schedulers:DatabaseScheduler --loglevel=info

networks:
  smr_internal:
    driver: bridge
    internal: true
  smr_egress:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  traefik_certs:
